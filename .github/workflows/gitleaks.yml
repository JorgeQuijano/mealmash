name: Gitleaks Secret Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.23.3/gitleaks_8.23.3_linux_x64.tar.gz | tar -xz
          chmod +x gitleaks
          ./gitleaks detect --source . --path-warning --fail
        env:
          GITLEAKS_LICENSE: ""  # Free for public repos
